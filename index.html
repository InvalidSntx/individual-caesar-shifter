<!DOCTYPE html>
<html>
<body>
<h1>Shoutout Hermes627 for the original code</h1>
<input id="text" placeholder="Enter string">
<input id="nums" placeholder="Enter numbers separated by spaces">
<button onclick="run()">Run</button>

<p id="output"></p>

<script>
function run(){
    let orig = document.getElementById("text").value;
    let nums = document.getElementById("nums").value.split(" ").map(Number);
    let caesar = "";

    for(let i=0;i<orig.length;i++){
        let now = orig[i];
        if(now >= 'A' && now <= 'Z'){
            caesar += String.fromCharCode((now.charCodeAt(0)-65+nums[i])%26+65);
        }else{
            caesar += String.fromCharCode((now.charCodeAt(0)-97+nums[i])%26+97);
        }
    }

    document.getElementById("output").innerText = caesar;
}
</script>

</body>
</html>
